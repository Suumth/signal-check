  - knowledge/signal-check-run-assistant/upload-ready/02-methodology-prompts.md
  - knowledge/signal-check-run-assistant/upload-ready/03-run-pack-templates-lite.md
  - knowledge/signal-check-run-assistant/upload-ready/04-segments-panel-general.md
  - knowledge/signal-check-run-assistant/upload-ready/05-phase-map.md
  - knowledge/signal-check-run-assistant/upload-ready/06-example-quiet-invoice.md
