version: "1.0-rc.1"
purpose: "Detect high-risk claim language that could make Signal Check sound like market research or real user evidence."
scanner:
  default_mode: "fail_on_uncontextualized_claim"
  context_window_lines: 4
  allowed_context_keywords:
    - "do not"
    - "does not"
    - "not"
    - "not included"
    - "no "
    - "no_"
    - "never"
    - "avoid"
    - "guardrail"
    - "anti-claim"
    - "claim boundary"
    - "claim-safe"
    - "claim safety"
    - "unsafe_claims"
    - "limit"
    - "boundary"
    - "risk"
    - "failure"
    - "blocked"
    - "block"
    - "forbidden"
    - "out-of-scope"
    - "cannot"
    - "should not"
    - "must not"
    - "unless"
    - "without"
    - "out of scope"
  skipped_path_fragments:
    - ".git/"
    - "quality-gates/claim-risk-patterns.yaml"
    - "tools/quality/check_claim_risk.rb"
    - "templates/validation/claim-review-note.template.md"
    - "examples/v1-release-candidate/blocked-synthesis-claim-risk/"
patterns:
  - id: "validated_demand"
    category: "market_proof"
    terms:
      - "validated demand"
      - "demand validated"
      - "proves demand"
      - "proven demand"
      - "predict demand"
  - id: "purchase_intent"
    category: "purchase_intent"
    terms:
      - "validated purchase intent"
      - "purchase intent"
      - "proves willingness to pay"
      - "confirmed willingness to pay"
      - "users will buy"
  - id: "representative_claims"
    category: "representation"
    terms:
      - "representative sample"
      - "representative evidence"
      - "statistically representative"
      - "market-wide conclusion"
      - "generalizable finding"
  - id: "real_user_evidence"
    category: "user_evidence"
    terms:
      - "users said"
      - "customer quote"
      - "testimonial"
      - "real user voices"
      - "real user feedback"
  - id: "ai_replaces_research"
    category: "research_substitution"
    terms:
      - "replaces user research"
      - "instead of talking to users"
      - "no need for user interviews"
      - "ai market research"
      - "ai replaces user research"
  - id: "product_verdict"
    category: "product_verdict"
    terms:
      - "the idea is validated"
      - "the product is validated"
      - "build this now"
      - "guaranteed product-market fit"
