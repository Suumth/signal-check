run_id: "two-audience-homepage-mini-run"
purpose: "Compare homepage story architectures."
stimuli:
  - id: "A"
    label: "Brand-first product lab"
    text: "We build calm, focused digital products for complex decisions."
    hypothesis: "May create a broad premium frame, but could feel abstract without proof."
  - id: "B"
    label: "Proof product early"
    text: "We build calm, focused digital products. Our first proof is a practical product that turns messy signals into clear next steps."
    hypothesis: "May make the lab credible by showing concrete proof early."
  - id: "C"
    label: "Method-first"
    text: "Our method helps builders test product assumptions before they build too much."
    hypothesis: "May appeal to professional visitors, but could feel too meta for product buyers."
  - id: "D"
    label: "Proof-product only"
    text: "A product that helps people make better decisions in one specific everyday context."
    hypothesis: "May be clear for buyers, but could hide the broader lab and method."
negative_control:
  - id: "NC1"
    label: "AI innovation studio"
    text: "An AI-powered innovation studio creating next-generation experiences with intelligent workflows."
    should_expose: "Vague AI-first language that sounds impressive but does not explain the product or method."
claim_boundaries:
  - "No claim of validation."
  - "No claim of representative user reaction."
  - "No synthetic testimonials."
  - "No proof of demand."
