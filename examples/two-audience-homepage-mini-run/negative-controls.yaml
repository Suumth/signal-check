run_id: "two-audience-homepage-mini-run"
purpose: "Detect vague, over-positive, or misleading homepage language."
controls:
  - id: "NC1"
    type: "vague_ai_studio"
    stimulus: "An AI-powered innovation studio creating next-generation experiences with intelligent workflows."
    expected_failure: "Sounds broad and polished but does not explain what exists, who it helps, or what proof exists."
  - id: "NC2"
    type: "personal_portfolio"
    stimulus: "A personal portfolio about product thinking, leadership, and digital transformation."
    expected_failure: "May shift attention from product proof to the builder's CV."
  - id: "NC3"
    type: "single_product_trap"
    stimulus: "A homepage only about the proof product, without explaining the broader lab."
    expected_failure: "May be clear but too narrow."
  - id: "NC4"
    type: "method_only_trap"
    stimulus: "A homepage only about the method, without showing a concrete product."
    expected_failure: "May feel abstract, academic, or self-referential."
failure_rule:
  if_negative_controls_perform_as_well_as_real_stimuli: "Reduce confidence and reframe the homepage language around concrete proof and bounded claims."
