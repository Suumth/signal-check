dimensions:
  - id: comprehension
    name: Comprehension
    anchors:
      - label: unclear
        description: The respondent cannot explain what the product does.
      - label: partial
        description: The respondent understands the category but misses the workflow.
      - label: concrete
        description: The respondent can describe the cooking moment and expected help.
  - id: urgency
    name: Urgency
    anchors:
      - label: low
        description: The situation is occasional or easy to ignore.
      - label: mixed
        description: The situation matters for some cooks or cuts.
      - label: high
        description: The situation creates repeated stress, mistakes, or wasted food.
  - id: trust_friction
    name: Trust friction
    anchors:
      - label: blocking
        description: The respondent would not trust the cue during cooking.
      - label: manageable
        description: Trust depends on clear limits and user control.
      - label: low
        description: The respondent accepts cues as a helper, not an authority.
  - id: compatibility_clarity
    name: Compatibility clarity
    anchors:
      - label: unclear
        description: The respondent assumes a manufacturer partnership, official integration, or device guarantee.
      - label: partial
        description: The respondent understands compatibility is relevant but still asks which devices are supported.
      - label: bounded
        description: The respondent understands manufacturer names only as neutral beta or compatibility context.
  - id: real_world_next_step
    name: Real-world next step
    anchors:
      - label: missing
        description: The reaction does not suggest a concrete next test.
      - label: plausible
        description: The reaction points to a small comprehension or outreach test.
      - label: concrete
        description: The reaction identifies a reachable segment, material, and testable uncertainty.
