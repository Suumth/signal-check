stimuli:
  - id: searcue_short
    type: landing_copy
    content: "SearCue helps iPhone users with Bluetooth grill thermometers understand the next grill moment: target temperature, pull from heat, check heat, rest, reconnect, or review the cook history."
  - id: searcue_workflow
    type: feature_copy
    content: "Start a cook, connect a compatible Bluetooth thermometer, choose a target temperature, and get brief cue cards during the session: check heat, pull from the grill, start rest, reconnect, and review the temperature path."
  - id: searcue_compatibility_note
    type: feature_copy
    content: "Beta compatibility work may include GrillEye, ThermoPro, and Inkbird thermometer users as neutral test contexts. This does not imply partnership, sponsorship, official integration, or food-safety guarantees."
  - id: generic_control
    type: negative_control
    content: "A smart food platform that unlocks better meal outcomes with personalized insights."
  - id: partnership_control
    type: negative_control
    content: "The official grill thermometer intelligence layer for every major device brand, guaranteeing better cooking outcomes."
