run_id: searcue-v0-example
brief: examples/searcue/brief.md
segments:
  fitting:
    - panels/general/hardware_companion_apps.yaml
    - panels/general/prosumer_utilities.yaml
  adjacent:
    - panels/general/consumer_apps.yaml
    - panels/general/app_store_shoppers.yaml
  skeptical:
    - panels/general/subscription_skeptics.yaml
  poor_fit:
    - panels/general/small_business_tools.yaml
negative_controls:
  - examples/searcue/negative-controls.yaml
compatibility_context:
  manufacturers:
    - GrillEye
    - ThermoPro
    - Inkbird
  rule: Neutral beta or compatibility context only. No partnership, sponsorship, official integration, manufacturer criticism, or food-safety guarantee.
non_market_control:
  segment: panels/general/small_business_tools.yaml
  purpose: Confirms that a non-cooking business-tools perspective does not become false support for the idea.
kill_criteria:
  - Fitting segments must describe a concrete cooking moment in their own words.
  - Skeptical segments must not treat the idea as just another subscription wrapper.
  - Negative controls must not receive stronger reactions than the SearCue stimulus.
  - Manufacturer compatibility mentions must not be interpreted as partnership or official support.
  - Food-safety expectations must remain outside the product claim.
smallest_real_anchor_required: true
